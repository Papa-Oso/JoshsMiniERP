name = "React Router"
roles = ["frontend", "backend"]
webhooks_path = "/webhooks/app/uninstalled"

[commands]
predev = "node scripts/run-with-default-database-url.mjs npx prisma generate"
dev = "node scripts/run-with-default-database-url.mjs npx prisma migrate deploy && node scripts/run-with-default-database-url.mjs npm exec react-router dev"
